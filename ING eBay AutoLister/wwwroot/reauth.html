<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>eBay Re-Auth</title></head>
<body>
<p>Redirecting to eBay authorization...</p>
<script>
fetch('/api/ebay/auth-url')
  .then(r => r.json())
  .then(d => {
    if (d.url) window.location.href = d.url;
    else document.body.innerHTML = '<p style="color:red">Error: ' + (d.error || 'Could not build OAuth URL. Check your eBay credentials in Settings.') + '</p>';
  })
  .catch(e => { document.body.innerHTML = '<p style="color:red">Error: ' + e.message + '</p>'; });
</script>
</body>
</html>
